<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - Gestão de Creches</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <nav>
            <h1>Indicadores de Gestão</h1>
            <ul>
                <li><a href="/">Visão Pública</a></li>
                <li><a href="/admin">Administração</a></li>
                <li><a href="/dashboard" class="active">Estatísticas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1200px;">
            <!-- KPIs Topo -->
            <div class="card" style="grid-column: span 2; display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <h3>Tempo Médio de Espera</h3>
                    <div id="kpiTempo" class="badge" style="background: #6366f1; font-size: 1.2rem; padding: 0.5rem 1rem;">Carregando...</div>
                </div>
                <div>
                    <h3>Taxa de Ocupação</h3>
                    <div id="kpiOcupacao" class="badge" style="background: #10b981; font-size: 1.2rem; padding: 0.5rem 1rem;">Carregando...</div>
                </div>
            </div>

            <!-- Gráfico 1: Ocupação e Fila por Categoria (O Mais Inteligente) -->
            <div class="card" style="grid-column: span 2;">
                <h2>Distribuição por Faixa Etária (Matrículas vs Espera)</h2>
                <div style="height: 350px;">
                    <canvas id="chartBreakdown"></canvas>
                </div>
            </div>

            <!-- Gráfico 2: Perfil Vulnerabilidade -->
            <div class="card">
                <h2>Perfil de Prioridade</h2>
                <div style="height: 250px;">
                    <canvas id="chartVulnerabilidade"></canvas>
                </div>
            </div>

            <!-- Gráfico 3: Distribuição por Bairro -->
            <div class="card">
                <h2>Distribuição por Bairro</h2>
                <div style="height: 250px;">
                    <canvas id="chartBairro"></canvas>
                </div>
            </div>

            <div class="card" style="background: #f1f5f9; display: flex; flex-direction: column; justify-content: center;">
                <h3 style="color: #475569; margin-top: 0;">Dica de Gestão</h3>
                <p id="insightTexto">Carregando insights...</p>
            </div>
        </div>
    </main>

    <script>
        async function carregarGraficos() {
            const res = await fetch('/api/admin/dashboard/stats');
            const data = await res.json();

            // Atualiza KPIs
            document.getElementById('kpiTempo').innerText = data.kpis.tempo_medio_espera;
            document.getElementById('kpiOcupacao').innerText = data.kpis.taxa_ocupacao;

            // Gerar Insight dinâmico
            const totalFila = Object.values(data.breakdown_categoria).reduce((acc, cat) => acc + cat.aguardando, 0);
            document.getElementById('insightTexto').innerText = totalFila > 3 
                ? `Atenção: Há ${totalFila} crianças aguardando vaga. Considere ampliar a capacidade das categorias sob maior pressão.`
                : "A demanda está estável e controlada no momento.";

            // Gráfico de Breakdown por Categoria (Barras Empilhadas)
            const labels = data.labels;
            const matriculadas = labels.map(l => data.breakdown_categoria[l].matriculada);
            const aguardando = labels.map(l => data.breakdown_categoria[l].aguardando);

            new Chart(document.getElementById('chartBreakdown'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Matriculadas',
                            data: matriculadas,
                            backgroundColor: '#10b981', // Verde
                        },
                        {
                            label: 'Na Fila',
                            data: aguardando,
                            backgroundColor: '#f59e0b', // Laranja
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true }
                    },
                    plugins: {
                        legend: { position: 'top' }
                    }
                }
            });

            // Gráfico de Vulnerabilidade (Pizza)
            new Chart(document.getElementById('chartVulnerabilidade'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data.perfil_vulnerabilidade),
                    datasets: [{
                        data: Object.values(data.perfil_vulnerabilidade),
                        backgroundColor: ['#6366f1', '#e2e8f0']
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });

            // Gráfico de Bairros (Barras Horizontais)
            new Chart(document.getElementById('chartBairro'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.dist_bairro),
                    datasets: [{
                        label: 'Crianças',
                        data: Object.values(data.dist_bairro),
                        backgroundColor: '#6366f1',
                    }]
                },
                options: { 
                    indexAxis: 'y',
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        carregarGraficos();
    </script>
</body>
</html>
